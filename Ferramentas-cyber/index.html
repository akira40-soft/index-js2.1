<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ferramentas-cyber - Akira Bot</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            color: #00d4ff;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #b0b0b0;
            font-size: 1.1em;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .tool-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .tool-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .tool-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #00d4ff;
        }

        .tool-status {
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: bold;
        }

        .status-available {
            background: #00ff88;
            color: #000;
        }

        .status-unavailable {
            background: #ff4444;
            color: #fff;
        }

        .tool-description {
            color: #b0b0b0;
            margin-bottom: 15px;
        }

        .tool-category {
            display: inline-block;
            background: rgba(0, 212, 255, 0.2);
            color: #00d4ff;
            padding: 3px 8px;
            border-radius: 15px;
            font-size: 0.8em;
            margin-bottom: 15px;
        }

        .tool-form {
            display: none;
        }

        .tool-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #e0e0e0;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            font-family: monospace;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .btn {
            background: linear-gradient(45deg, #00d4ff, #0099cc);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s ease;
        }

        .btn:hover {
            background: linear-gradient(45deg, #0099cc, #0077aa);
        }

        .btn:disabled {
            background: #666;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.2);
            margin-left: 10px;
        }

        .output {
            margin-top: 15px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 5px;
            font-family: monospace;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }

        .output.active {
            display: block;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            backdrop-filter: blur(10px);
        }

        .footer p {
            color: #b0b0b0;
            margin-bottom: 10px;
        }

        .footer a {
            color: #00d4ff;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ Ferramentas-cyber</h1>
            <p>Servidor independente de ferramentas de cybersecurity para Akira Bot</p>
        </div>

        <div id="tools-container" class="tools-grid">
            <!-- Tools will be loaded here -->
        </div>

        <div class="footer">
            <p><strong>Akira Bot V21</strong> - Ferramentas de Cybersecurity</p>
            <p>⚠️ <strong>ATENÇÃO:</strong> Use apenas em ambientes autorizados. O uso indevido pode ser ilegal.</p>
            <p><a href="/status">📊 Status da API</a> | <a href="/tools">🔧 Lista de Ferramentas</a></p>
        </div>
    </div>

    <script>
        let tools = {};

        // Load tools on page load
        async function loadTools() {
            try {
                const response = await fetch('/tools');
                const data = await response.json();

                tools = data.tools;
                renderTools();
            } catch (error) {
                console.error('Erro ao carregar ferramentas:', error);
                document.getElementById('tools-container').innerHTML =
                    '<div class="tool-card"><h3>Erro ao carregar ferramentas</h3><p>Verifique se o servidor está rodando.</p></div>';
            }
        }

        // Render tools grid
        function renderTools() {
            const container = document.getElementById('tools-container');
            container.innerHTML = '';

            Object.values(tools).forEach(tool => {
                const card = document.createElement('div');
                card.className = 'tool-card';

                card.innerHTML = `
                    <div class="tool-header">
                        <div class="tool-name">${tool.name.toUpperCase()}</div>
                        <div class="tool-status ${tool.available ? 'status-available' : 'status-unavailable'}">
                            ${tool.available ? '✅ DISPONÍVEL' : '❌ INDISPONÍVEL'}
                        </div>
                    </div>
                    <div class="tool-description">${tool.description}</div>
                    <div class="tool-category">${tool.category.toUpperCase()}</div>
                    <div class="tool-form" id="form-${tool.name}">
                        ${getToolForm(tool.name)}
                        <div class="output" id="output-${tool.name}"></div>
                    </div>
                    <button class="btn" onclick="toggleForm('${tool.name}')" ${!tool.available ? 'disabled' : ''}>
                        ${tool.available ? 'Usar Ferramenta' : 'Ferramenta Indisponível'}
                    </button>
                `;

                container.appendChild(card);
            });
        }

        // Get form for specific tool
        function getToolForm(toolName) {
            const forms = {
                nmap: `
                    <div class="form-group">
                        <label for="nmap-target">Target (IP/Domínio):</label>
                        <input type="text" id="nmap-target" placeholder="ex: scanme.nmap.org">
                    </div>
                    <div class="form-group">
                        <label for="nmap-options">Opções (opcional):</label>
                        <input type="text" id="nmap-options" placeholder="ex: -sV -T4" value="-sV -T4">
                    </div>
                    <button class="btn" onclick="executeNmap()">Executar NMAP</button>
                `,
                sqlmap: `
                    <div class="form-group">
                        <label for="sqlmap-url">URL:</label>
                        <input type="text" id="sqlmap-url" placeholder="ex: http://example.com/page?id=1">
                    </div>
                    <div class="form-group">
                        <label for="sqlmap-param">Parâmetro:</label>
                        <input type="text" id="sqlmap-param" placeholder="ex: id" value="id">
                    </div>
                    <button class="btn" onclick="executeSqlmap()">Executar SQLMap</button>
                `,
                // Add more forms as needed
            };

            return forms[toolName] || `
                <div class="form-group">
                    <label for="${toolName}-args">Argumentos:</label>
                    <input type="text" id="${toolName}-args" placeholder="Argumentos da ferramenta">
                </div>
                <button class="btn" onclick="executeTool('${toolName}')">Executar ${toolName.toUpperCase()}</button>
            `;
        }

        // Toggle form visibility
        function toggleForm(toolName) {
            const form = document.getElementById(`form-${toolName}`);
            form.classList.toggle('active');
        }

        // Execute NMAP
        async function executeNmap() {
            const target = document.getElementById('nmap-target').value;
            const options = document.getElementById('nmap-options').value;

            if (!target) {
                alert('Target é obrigatório!');
                return;
            }

            await executeToolWithParams('nmap', { target, options });
        }

        // Execute SQLMap
        async function executeSqlmap() {
            const url = document.getElementById('sqlmap-url').value;
            const parameter = document.getElementById('sqlmap-param').value;

            if (!url) {
                alert('URL é obrigatória!');
                return;
            }

            await executeToolWithParams('sqlmap', { url, parameter });
        }

        // Generic tool execution
        async function executeTool(toolName) {
            const args = document.getElementById(`${toolName}-args`).value;
            await executeToolWithParams(toolName, { args: args.split(' ') });
        }

        // Execute tool with parameters
        async function executeToolWithParams(toolName, params) {
            const outputDiv = document.getElementById(`output-${toolName}`);
            const button = outputDiv.previousElementSibling;

            // Show loading
            button.innerHTML = '<div class="loading"></div> Executando...';
            button.disabled = true;

            outputDiv.classList.add('active');
            outputDiv.innerHTML = '🔧 Executando ferramenta...\n\n';

            try {
                const response = await fetch(`/execute/${toolName}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(params)
                });

                const result = await response.json();

                if (response.ok) {
                    outputDiv.innerHTML = `✅ ${toolName.toUpperCase()} executado com sucesso!\n\n`;
                    outputDiv.innerHTML += `📝 Comando: ${result.command}\n\n`;
                    outputDiv.innerHTML += `📄 Saída:\n${result.output}\n\n`;
                    if (result.error) {
                        outputDiv.innerHTML += `⚠️ Avisos:\n${result.error}`;
                    }
                } else {
                    outputDiv.innerHTML = `❌ Erro: ${result.error}`;
                }

            } catch (error) {
                outputDiv.innerHTML = `❌ Erro de rede: ${error.message}`;
            }

            // Reset button
            button.innerHTML = 'Executar Ferramenta';
            button.disabled = false;
        }

        // Load tools on page load
        loadTools();
    </script>
</body>
</html>
